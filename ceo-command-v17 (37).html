<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMAND · CEO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Solo Leveling × Blue Lock — HIGH ILLUMINATION ── */
  --black:#070710;--surface:#10101e;--surface2:#161628;
  --border:#22223a;--border2:#303055;
  --gold:#00f0ff;--gold2:#60d0ff;--gold-dim:rgba(0,240,255,.18);
  --ember:#4a9fff;--ember-dim:rgba(74,159,255,.2);--teal:#9d6fff;
  --text:#eef0ff;--muted:#7880aa;--muted2:#38385a;--white:#f8f9ff;
  /* Extra aura colors */
  --aura-violet:#c09aff;--aura-blue:#60d0ff;--aura-electric:#00f0ff;
  --aura-purple:#9d6fff;--aura-glow:rgba(157,111,255,.35);
  --f1:#c9a84c;--f2:#2ec4b6;--f3:#e8845a;--f4:#9b7fd4;--f5:#5aaa8c;
  --f6:#e05c7a;--f7:#6aabf0;--f8:#b0a090;--f9:#9b7fd4;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}html,body{background:var(--black);color:var(--text);font-family:'Crimson Pro',serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 60%,rgba(157,111,255,.12) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(0,240,255,.08) 0%,transparent 45%),radial-gradient(ellipse at 50% 100%,rgba(74,159,255,.06) 0%,transparent 40%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5;}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 45% at 50% -5%,rgba(0,229,255,.07) 0%,transparent 65%),radial-gradient(ellipse 40% 50% at 100% 100%,rgba(41,121,255,.04) 0%,transparent 55%);}

/* BOOT */
.boot{position:fixed;inset:0;z-index:50;background:var(--black);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .7s ease;}
.boot.out{opacity:0;pointer-events:none;}
.boot-ring{width:88px;height:88px;border-radius:50%;border:1px solid var(--aura-purple);display:flex;align-items:center;justify-content:center;position:relative;margin:0 auto 28px;animation:ring-in 1s ease both;box-shadow:0 0 50px var(--aura-glow),0 0 100px rgba(157,111,255,.2),inset 0 0 30px rgba(157,111,255,.15);}
@keyframes ring-in{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}
.boot-ring::before{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(0,229,255,.2);animation:spin 14s linear infinite;box-shadow:0 0 25px rgba(0,240,255,.35);}
.boot-ring::after{content:'';position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(0,229,255,.04);animation:spin 22s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.boot-c{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:var(--gold);text-shadow:0 0 20px var(--aura-electric),0 0 50px rgba(0,240,255,.7),0 0 80px rgba(0,240,255,.3);}
.boot-word{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:44px;animation:fu .7s .4s both ease;}
.boot-bar{width:180px;height:1px;background:var(--border);overflow:hidden;}
.boot-fill{height:100%;background:linear-gradient(90deg,var(--aura-purple),var(--aura-blue));animation:bfill 2.2s .5s ease forwards;width:0;}
@keyframes bfill{to{width:100%;}}
.boot-sys{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:.2em;text-transform:uppercase;margin-top:10px;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.app{position:relative;z-index:1;min-height:100vh;overflow-x:hidden;}
.page{width:100%;max-width:660px;margin:0 auto;padding:48px 20px 100px;}

/* APP BAR */
.app-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:52px;}
.mark{display:flex;align-items:center;gap:12px;}
.diamond{width:9px;height:9px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 10px rgba(0,240,255,.9),0 0 20px rgba(0,240,255,.4);}
.mark-txt{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;}
.date-txt{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}

.greeting{margin-bottom:44px;}
.g-sup{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;opacity:.8;}
.g-h{font-family:'Cinzel',serif;font-size:clamp(28px,5.5vw,40px);font-weight:600;line-height:1.12;color:var(--white);}
.g-h em{color:var(--gold);font-style:normal;}
.sec-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}

/* QUOTE */
.q-wrap{margin-bottom:40px;}
.q-card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--gold);padding:26px 28px;position:relative;overflow:hidden;}
.q-card::before{content:'"';position:absolute;top:-18px;left:16px;font-family:'Cinzel',serif;font-size:130px;color:rgba(0,229,255,.05);pointer-events:none;line-height:1;}
.q-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-style:italic;padding:10px 0;}
.dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--gold);animation:dp 1.4s infinite;margin:0 2px;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.7);}50%{opacity:1;transform:scale(1.3);}}
.q-text{font-size:19px;font-style:italic;font-weight:300;line-height:1.72;color:var(--text);margin-bottom:14px;position:relative;z-index:1;}
.q-author{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;}
.q-era{color:var(--muted);font-size:8px;letter-spacing:.1em;}
.q-reflect{margin-top:10px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.6;}
.q-refresh{position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--border2);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.q-refresh:hover{border-color:var(--gold);color:var(--gold);transform:rotate(90deg);}

.divider{display:flex;align-items:center;gap:10px;margin:32px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.divider span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:var(--muted2);text-transform:uppercase;}

/* REST */
.rest-grid{display:flex;gap:7px;margin-bottom:12px;}
.rb{flex:1;padding:12px 4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:all .18s;text-align:center;}
.rb:hover{border-color:var(--border2);color:var(--text);}
.rb.sel{background:var(--gold-dim);border-color:var(--gold);color:var(--gold2);}
.rb-emoji{display:block;font-size:22px;margin-bottom:5px;}
.rb-lbl{display:block;font-size:8px;letter-spacing:.12em;text-transform:uppercase;}
.rest-fb{font-size:13px;font-style:italic;min-height:20px;transition:color .3s;}

/* FIELDS */
.field-box{background:var(--surface);border:1px solid var(--border);transition:border-color .2s;margin-bottom:32px;}
.field-box:focus-within{border-color:var(--border2);}
.field-box textarea,.field-box input{width:100%;background:transparent;border:none;color:var(--text);font-family:'Crimson Pro',serif;font-size:16px;line-height:1.72;padding:18px 20px;resize:none;outline:none;}
.field-box textarea{min-height:96px;font-style:italic;}
.field-box textarea::placeholder,.field-box input::placeholder{color:var(--muted2);font-style:italic;}
.field-box input{color:var(--white);font-family:'Cinzel',serif;font-size:14px;letter-spacing:.03em;}
.field-hint{padding:6px 20px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;border-top:1px solid var(--border);}

/* LAUNCH */
.launch-btn{width:100%;padding:20px;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.55em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;}
.launch-btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .35s ease;}
.launch-btn:hover::before{transform:translateX(0);}
.launch-btn:hover{color:var(--black);}
.launch-btn span{position:relative;z-index:1;}
.launch-btn:disabled{opacity:.35;cursor:not-allowed;}
.launch-btn:disabled::before{display:none;}

/* DIAGNOSIS */
.diag-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.4em;color:var(--ember);text-transform:uppercase;margin-bottom:10px;}
.diag-title{font-family:'Cinzel',serif;font-size:clamp(20px,4vw,30px);font-weight:700;color:var(--white);line-height:1.15;margin-bottom:32px;}
.diag-card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--ember);padding:28px 30px;margin-bottom:24px;}
.diag-sec{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3em;color:var(--ember);text-transform:uppercase;margin-bottom:14px;}
.diag-body p{font-size:16px;line-height:1.82;color:var(--text);margin-bottom:12px;}
.diag-body p:last-child{margin-bottom:0;}
.sym-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.sym{background:var(--ember-dim);border:1px solid rgba(41,121,255,.3);padding:5px 14px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#e07060;letter-spacing:.15em;text-transform:uppercase;}
.alert-row{display:flex;align-items:center;gap:14px;padding:16px 20px;border:1px solid var(--border);margin-bottom:24px;}
.al-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.al-msg{font-size:13px;color:var(--muted);line-height:1.6;}
.al-msg strong{color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;display:block;margin-bottom:3px;}

/* ── RPG STATS BAR (routine header) ── */
.stats-panel{background:var(--surface);border:1px solid var(--border);padding:16px 20px;margin-bottom:24px;}
.stats-panel-title{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.ceo-level{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:.1em;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.stat-row{display:flex;flex-direction:column;gap:4px;}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between;}
.stat-val{color:var(--gold2);font-size:9px;}
.stat-track{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.34,1.56,.64,1);}

/* ── PHASE COMPLETE OVERLAY ── */
.phase-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(6,6,8,.92);backdrop-filter:blur(12px);animation:ov-in .3s ease both;}
@keyframes ov-in{from{opacity:0;}to{opacity:1;}}
.phase-overlay.out{animation:ov-out .4s ease both;}
@keyframes ov-out{from{opacity:1;}to{opacity:0;}}
.ov-inner{max-width:480px;width:90%;text-align:center;padding:20px;}
.ov-phase-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;animation:fu .4s .1s both ease;}
.ov-title{font-family:'Cinzel',serif;font-size:clamp(28px,6vw,48px);font-weight:900;color:var(--white);letter-spacing:.05em;line-height:1.05;margin-bottom:8px;animation:fu .4s .15s both ease;}
.ov-subtitle{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px;animation:fu .4s .2s both ease;}

/* XP gains */
.ov-gains{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px;animation:fu .4s .25s both ease;}
.gain-chip{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;animation:chip-pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes chip-pop{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
.gain-chip:nth-child(2){animation-delay:.08s;}

/* Mentor quote */
.ov-mentor{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);border-left:2px solid var(--gold);padding:20px 24px;text-align:left;margin-bottom:28px;animation:fu .4s .3s both ease;}
.ov-mentor-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-style:italic;}
.ov-mentor-text{font-family:'Crimson Pro',serif;font-size:18px;font-style:italic;line-height:1.7;color:var(--text);margin-bottom:10px;}
.ov-mentor-author{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;}

/* Stat bars in overlay */
.ov-stats{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;animation:fu .4s .35s both ease;}
.ov-stat{display:flex;align-items:center;gap:12px;}
.ov-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;min-width:90px;text-align:right;}
.ov-stat-track{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.ov-stat-fill{height:100%;border-radius:2px;width:0;transition:width 1s cubic-bezier(.34,1.56,.64,1);}
.ov-stat-val{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold2);min-width:28px;}

.ov-continue{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;cursor:pointer;animation:fu .4s .5s both ease;padding:12px 24px;border:1px solid var(--border2);background:transparent;transition:all .2s;}
.ov-continue:hover{border-color:var(--gold);color:var(--gold);}

/* ── ROUTINE ── */
.rp-track{height:5px;background:var(--border2);border-radius:3px;margin-bottom:8px;overflow:hidden;}
.rp-fill{height:100%;background:linear-gradient(90deg,var(--aura-purple),var(--aura-blue));transition:width .5s ease;}
.rp-stats{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:20px;}

.phase-block{margin-bottom:14px;}
.ph-header{display:flex;align-items:center;gap:10px;padding:14px 16px;min-height:54px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:border-color .2s;user-select:none;-webkit-user-select:none;}
.ph-header:hover{border-color:var(--border2);}
.ph-num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--muted);min-width:22px;}
.ph-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ph-name{font-family:'Cinzel',serif;font-size:12px;flex:1;letter-spacing:.05em;}
.ph-min{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;}
.ph-pct{font-family:'JetBrains Mono',monospace;font-size:9px;margin-left:6px;}
.ph-chev{font-size:9px;color:var(--muted);margin-left:4px;transition:transform .22s;}
.ph-chev.open{transform:rotate(180deg);}
.ph-body{background:var(--surface);border:1px solid var(--border);border-top:none;padding:0 18px 14px;}
.ai-note{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);padding:10px 14px;margin:14px 0 6px;font-size:12px;color:var(--muted);font-style:italic;line-height:1.65;}
.ai-note strong{color:var(--gold);font-style:normal;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;display:block;margin-bottom:4px;}

.anchor{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);}
.anchor:last-of-type{border-bottom:none;}
.a-check{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .18s;margin-top:0;}
.a-check:hover{border-color:var(--gold);}
.anchor.done .a-check{background:var(--gold);border-color:var(--gold);color:var(--black);}
.a-name{font-size:14px;margin-bottom:2px;transition:color .2s;}
.anchor.done .a-name{color:var(--muted);text-decoration:line-through;}
.a-desc{font-size:11px;color:var(--muted);line-height:1.55;font-style:italic;}
.a-min{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);margin-top:3px;letter-spacing:.1em;}
.yt-btn{display:inline-flex;align-items:center;gap:7px;margin-top:8px;padding:6px 13px;background:rgba(41,121,255,.1);border:1px solid rgba(41,121,255,.3);color:#e07060;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s;}
.yt-btn:hover{background:rgba(41,121,255,.2);}

/* TIMER */
.timer-wrap{margin-top:10px;background:var(--surface2);border:1px solid var(--border2);padding:12px 16px;display:flex;align-items:center;gap:14px;}
.timer-display{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--gold);letter-spacing:.08em;min-width:56px;}
.timer-display.warning{color:var(--ember);animation:pulse-warn .8s infinite;}
.timer-display.done-flash{color:var(--teal);}
@keyframes pulse-warn{0%,100%{opacity:1;}50%{opacity:.4;}}
.timer-ring{position:relative;width:40px;height:40px;flex-shrink:0;}
.timer-ring svg{transform:rotate(-90deg);}
.tr-bg{fill:none;stroke:var(--border2);stroke-width:3;}
.tr-fill{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s;}
.timer-info{flex:1;}
.timer-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:3px;}
.timer-status{font-size:11px;color:var(--muted);font-style:italic;}
.timer-btns{display:flex;gap:6px;flex-shrink:0;}
.t-btn{padding:6px 12px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .18s;}
.t-btn:hover{border-color:var(--gold);color:var(--gold);}
.t-btn.start{border-color:rgba(0,229,255,.4);color:var(--gold);}

/* BREATH */
.breath-wrap{margin-top:10px;background:var(--surface2);border:1px solid var(--border2);padding:14px 16px;}
.breath-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.breath-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
.breath-count{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--f4);letter-spacing:.1em;}
.breath-dots{display:flex;gap:8px;margin-bottom:12px;}
.b-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.b-dot.filled{background:var(--f4);border-color:var(--f4);color:var(--black);}
.breath-guide{font-size:11px;color:var(--muted);font-style:italic;}
.breath-btn{margin-top:10px;padding:8px 16px;border:1px solid rgba(155,127,212,.4);background:transparent;color:var(--f4);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%;}
.breath-btn:hover{background:rgba(155,127,212,.1);}
.breath-anim{display:flex;align-items:center;gap:10px;margin-top:10px;}
.breath-circle{width:36px;height:36px;border-radius:50%;background:rgba(155,127,212,.15);border:1.5px solid var(--f4);transition:transform .4s ease,opacity .4s ease;}

/* ══════════════════════════════════════════════════════════════
   RESPONSIVE SYSTEM — Mobile-first, 320px → 768px → 1024px+
══════════════════════════════════════════════════════════════ */

/* Touch baseline */
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
button, a { touch-action: manipulation; }

/* ── 480px and below: phones ─────────────────────────── */
@media (max-width: 480px) {

  /* Tab bar */
  .main-tabs-inner { padding: 0; }
  .main-tab {
    flex: 1; text-align: center;
    padding: 13px 6px;
    font-size: 8px; letter-spacing: .1em;
  }

  /* Page container */
  .page { padding: 24px 16px 96px; }

  /* App bar */
  .app-bar { margin-bottom: 24px; }
  .date-txt { display: none; }

  /* Greeting */
  .greeting { margin-bottom: 28px; }
  .g-h { font-size: clamp(26px, 7vw, 36px); }

  /* Quote card */
  .q-card { padding: 20px 18px; }
  .q-text { font-size: 17px; line-height: 1.65; }

  /* Rest grid — 5 columns, compact */
  .rest-grid { gap: 4px; }
  .rb { padding: 10px 2px; }
  .rb-emoji { font-size: 18px; margin-bottom: 3px; }
  .rb-lbl { font-size: 7px; }

  /* Fields */
  .field-box textarea { font-size: 15px; padding: 14px 16px; }

  /* Launch button */
  .launch-btn { padding: 17px; font-size: 10px; letter-spacing: .4em; }

  /* Progress row */
  .rp-stats { font-size: 9px; }

  /* Phase headers — full tap target */
  .ph-header {
    padding: 15px 14px;
    gap: 9px; min-height: 54px;
  }
  .ph-name { font-size: 11px; }
  .ph-min { display: none; } /* hide min, show pct only */
  .ph-pct { font-size: 9px; }
  .ph-num { font-size: 8px; min-width: 18px; }
  .ph-chev { font-size: 9px; }

  /* Phase body */
  .ph-body { padding: 0 14px 16px; }

  /* Anchors — comfortable touch targets */
  .anchor { padding: 16px 0; gap: 14px; }
  .a-check {
    width: 36px; height: 36px;
    font-size: 16px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .a-name { font-size: 15px; line-height: 1.4; }
  .a-desc { font-size: 12px; line-height: 1.6; }
  .a-min { font-size: 9px; }
  .yt-btn { font-size: 9px; padding: 7px 12px; margin-top: 10px; }

  /* Timer */
  .timer-wrap {
    padding: 14px 12px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .timer-display { font-size: 26px; min-width: 70px; }
  .timer-ring { width: 44px; height: 44px; }
  .t-btn { padding: 9px 14px; font-size: 9px; }
  .timer-btns { gap: 5px; }

  /* Breath counter */
  .breath-wrap { padding: 16px 14px; }
  .breath-count { font-size: 24px; }
  .b-dot { width: 32px; height: 32px; font-size: 12px; }
  .breath-dots { gap: 6px; flex-wrap: wrap; }
  .breath-btn { padding: 12px; font-size: 9px; }
  .breath-circle { width: 44px; height: 44px; }

  /* AI note */
  .ai-note { font-size: 12px; padding: 12px 14px; }

  /* Phase complete overlay */
  .ov-inner { width: 96vw; padding: 28px 18px; }
  .ov-title { font-size: clamp(24px, 7vw, 36px); }
  .ov-gains { gap: 6px; }
  .gain-chip { padding: 6px 10px; font-size: 9px; }
  .ov-mentor { padding: 16px 18px; }
  .ov-mentor-text { font-size: 16px; }
  .ov-stats { gap: 7px; }
  .ov-stat-lbl { min-width: 72px; font-size: 8px; }
  .ov-continue { width: 100%; text-align: center; padding: 15px; }

  /* Diagnosis screen */
  .diag-card { padding: 20px 18px; }
  .diag-body p { font-size: 15px; }
  .diag-title { font-size: clamp(18px, 5vw, 26px); margin-bottom: 24px; }

  /* Day map */
  .day-map { margin-top: 28px; }
  .dm-phase { padding: 13px 0; gap: 11px; }
  .dm-name { font-size: 13px; }
  .dm-sub { font-size: 10px; }
  .dm-chk { font-size: 20px; }

  /* Toast */
  .toast { bottom: 80px; font-size: 10px; padding: 10px 18px; width: 90vw; text-align: center; }

  /* API key banner */
  .apikey-input-row { flex-direction: column; }
  .apikey-save-btn { width: 100%; padding: 12px; }
}

/* ── 768px and below: tablets + phones ───────────────── */
@media (max-width: 768px) {

  /* Profile view: stack sidebar above content */
  .pv-wrap { grid-template-columns: 1fr; }
  .pv-sidebar {
    position: static; height: auto;
    border-right: none; border-bottom: 1px solid var(--border);
    padding: 20px 16px;
    /* Transformaciones: 2-col grid on mobile */
  }
  .pv-ladder { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .pv-main { padding: 24px 16px 80px; }
  .pv-name { font-size: 22px; }

  /* Profile tabs scroll horizontally */
  .pv-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 0; }
  .pv-tab { white-space: nowrap; }

  /* Skill grid: single column on small screens */
  .pv-skill-grid { grid-template-columns: 1fr; }
  .pv-unlocked-grid { grid-template-columns: 1fr; }

  /* Global progress: stack */
  .pv-global-prog { flex-direction: column; align-items: stretch; gap: 6px; }
  .pv-gbar-pct { text-align: left; font-size: 20px; }

  /* Profile skill detail — readable on mobile */
  .pv-sd-sci { font-size: 14px; line-height: 1.7; }
  .pv-sd-top { flex-wrap: wrap; gap: 6px; }

  /* Hex grid — 5 cols still works, just smaller */
  .pv-hex-grid { gap: 4px; }
  .pv-hex { padding: 2px; }
}

/* ── Scrolling behavior ──────────────────────────────── */
@media (max-width: 768px) {
  html { scroll-behavior: smooth; }
  body { -webkit-overflow-scrolling: touch; }
  .page, .pv-main { -webkit-overflow-scrolling: touch; }
}

/* Projection */

.av-proj-form{display:flex;align-items:center;gap:8px;}

.av-proj-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.av-proj-fname{font-family:'Cinzel',serif;font-size:11px;font-weight:700;margin-bottom:2px;}
.av-proj-fxp{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);}
.av-proj-arc-wrap{position:relative;display:flex;align-items:center;justify-content:center;}

.av-proj-arc-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}

.av-proj-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

/* Heatmap */
.av-hm-wrap{display:flex;gap:3px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}

.av-hm-col{display:flex;flex-direction:column;gap:3px;}
.av-hm-cell{width:13px;height:13px;border-radius:2px;cursor:default;transition:transform .1s;}
.av-hm-cell.today{border-color:var(--gold) !important;box-shadow:0 0 6px rgba(0,229,255,.3);}

.av-hm-legend{display:flex;align-items:center;gap:4px;margin-top:10px;}

/* Anchor bars */
.av-anchors-grid{display:flex;flex-direction:column;gap:10px;}
.av-anchor-row{display:grid;grid-template-columns:180px 1fr 36px;align-items:center;gap:10px;}
@media(max-width:480px){.av-anchor-row{grid-template-columns:1fr auto;}.av-anchor-bar-wrap{display:none;}}
.av-anchor-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Mobile adjustments */

  min-height:88px;
}
.dm-phase-header:hover{filter:brightness(1.05);}

/* Número grande lateral */
.dm-num{
  width:58px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:26px;font-weight:700;
  color:var(--border2);
  border-right:1px solid var(--border);
  align-self:stretch;
  transition:all .3s;
  letter-spacing:-.02em;
}
.dm-phase.done .dm-num{color:inherit;}

/* Info central */
.dm-info{flex:1;padding:18px 20px;}
.dm-name{font-family:'Cinzel',serif;font-size:clamp(15px,2.5vw,18px);font-weight:600;color:var(--muted);letter-spacing:.02em;margin-bottom:4px;transition:color .3s;}
.dm-phase.done .dm-name{color:var(--white);}
.dm-sub{font-size:12px;color:var(--muted2);font-style:italic;letter-spacing:.03em;}
.dm-phase.done .dm-sub{color:var(--muted);}

/* XP + estado derecha */
.dm-right{
  padding:18px 20px;
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  flex-shrink:0;
}
.dm-xp-chip{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.12em;padding:4px 12px;
  border:1px solid;border-radius:1px;
  transition:all .3s;
}
.dm-phase.done .dm-xp-chip{font-weight:700;}
.dm-status-icon{
  font-size:11px;font-family:'JetBrains Mono',monospace;
  letter-spacing:.08em;color:var(--muted2);
  transition:all .3s;
}
.dm-phase.done .dm-status-icon{color:var(--teal);}

/* Body expandido */
.dm-phase-body{
  padding:0 20px 20px 78px;
  animation:fu .2s ease both;
  border-top:1px solid var(--border);
}
.dm-log-input{
  width:100%;background:rgba(0,0,0,.2);
  border:1px solid var(--border);
  color:var(--text);font-family:'Crimson Pro',serif;
  font-size:14px;font-style:italic;
  padding:12px 14px;resize:none;outline:none;
  min-height:70px;line-height:1.65;
  transition:border-color .2s;margin-top:14px;
}
.dm-log-input::placeholder{color:var(--muted2);}
.dm-log-input:focus{border-color:var(--border2);}
.dm-log-save{
  margin-top:8px;padding:8px 20px;
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);font-family:'JetBrains Mono',monospace;
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.dm-log-save:hover{border-color:var(--gold);color:var(--gold);}

/* ══ DIA VIEW ══ */
.dia-view{max-width:700px;margin:0 auto;padding:28px 20px 100px;}
.dia-header{margin-bottom:28px;}
.dia-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.dia-title{font-family:'Cinzel',serif;font-size:clamp(22px,4vw,30px);font-weight:700;color:var(--white);line-height:1.1;}
.dia-sub{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic;}

/* Fases */
.dia-phases{display:flex;flex-direction:column;gap:8px;margin-bottom:32px;}
.dia-phase{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;transition:all .3s;}
.dia-phase.done{border-left-color:var(--phase-color,var(--gold));}
.dia-phase-header{display:flex;align-items:center;gap:0;cursor:pointer;min-height:80px;padding:0;}
.dia-phase-header:hover{filter:brightness(1.06);}
.dia-phase-num{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:24px;font-weight:700;letter-spacing:-.02em;
  border-right:1px solid var(--border);align-self:stretch;transition:color .3s;}
.dia-phase-info{flex:1;padding:16px 18px;}
.dia-phase-name{font-family:'Cinzel',serif;font-size:16px;font-weight:600;letter-spacing:.02em;margin-bottom:3px;}
.dia-phase-sub{font-size:11px;color:var(--muted2);font-style:italic;}
.dia-phase-right{padding:16px 18px;flex-shrink:0;display:flex;align-items:center;}
.dia-done-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;
  padding:5px 12px;border:1px solid;font-weight:700;}
.dia-open-hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);}
.dia-phase-body{border-top:1px solid var(--border);padding:18px 18px 14px 74px;}
.dia-done-btn{
  margin-top:16px;width:100%;padding:14px;
  background:transparent;border:1px solid var(--phase-color,var(--gold));
  color:var(--phase-color,var(--gold));
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.1em;
  cursor:pointer;transition:all .25s;text-transform:uppercase;
}
.dia-done-btn:hover{background:color-mix(in srgb, var(--phase-color,var(--gold)) 12%, transparent);
  box-shadow:0 0 20px color-mix(in srgb, var(--phase-color,var(--gold)) 20%, transparent);}

/* Charts */
.dia-charts{margin-top:8px;}
.dia-charts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.dia-charts-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--white);}
.dia-refresh-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 12px;cursor:pointer;transition:all .2s;}
.dia-refresh-btn:hover{color:var(--gold);border-color:var(--gold);}
.dia-chart-card{background:var(--surface);border:1px solid var(--border);padding:18px 20px;margin-bottom:12px;}
.dia-chart-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.25em;
  color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.dia-charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.dia-charts-row{grid-template-columns:1fr;}.dia-phase-body{padding-left:18px;}}

/* ══ TIMELINE DASHBOARD ══ */
.tl-wrap{padding:0 0 40px;}
.tl-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.tl-filter{background:transparent;border:1px solid var(--border2);color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;
  padding:6px 14px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.tl-filter:hover{color:var(--text);border-color:var(--border2);}
.tl-filter.active{font-weight:700;}

.tl-range{display:flex;gap:4px;margin-bottom:16px;}
.tl-range-btn{background:transparent;border:1px solid var(--border);color:var(--muted2);
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;
  padding:4px 10px;cursor:pointer;transition:all .2s;}
.tl-range-btn.active{background:var(--border2);color:var(--text);}
.tl-range-btn:hover{color:var(--muted);}

/* Grid */
.tl-grid-wrap{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);margin-bottom:12px;position:relative;}
.tl-row-labels{flex-shrink:0;border-right:1px solid var(--border);min-width:110px;}
.tl-group-labels{display:flex;flex-direction:column;}
.tl-group-label{display:flex;align-items:center;padding:0 10px;
  font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.18em;
  color:var(--muted2);text-transform:uppercase;border-bottom:1px solid var(--border);}
.tl-row-label{height:28px;display:flex;align-items:center;justify-content:space-between;
  padding:0 10px;border-bottom:1px solid var(--border);gap:8px;}
.tl-row-label span:first-child{font-family:'Crimson Pro',serif;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.tl-row-count{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;}

.tl-grid-scroll{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative;}
/* Fila de fechas */
.tl-dates-row{display:flex;border-bottom:1px solid var(--border);min-height:20px;}
.tl-day-col-header{flex:0 0 14px;font-family:'JetBrains Mono',monospace;font-size:6px;
  color:var(--muted2);display:flex;align-items:center;overflow:visible;white-space:nowrap;
  padding-left:1px;}
/* Fila de datos */
.tl-data-row{display:flex;border-bottom:1px solid var(--border);}
.tl-cell{flex:0 0 14px;height:28px;background:var(--surface2);
  border-right:1px solid var(--border);cursor:pointer;
  transition:filter .1s;}
.tl-cell-on{border-right:1px solid rgba(0,0,0,.3);}
.tl-cell:hover{filter:brightness(1.4);}
/* Header vacío sobre labels */
.tl-row-label-header{height:20px;border-bottom:1px solid var(--border);}

/* Tooltip */
.tl-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border2);padding:10px 14px;
  min-width:150px;z-index:20;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.tl-tooltip-date{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--gold);
  letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.tl-tooltip-line{font-size:12px;color:var(--text);margin-bottom:2px;}
.tl-tooltip-empty{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted2);font-style:italic;}

/* Stats */
.tl-stats{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.tl-stat-item{display:flex;flex-direction:column;align-items:center;
  background:var(--surface);border:1px solid var(--border);padding:10px 18px;min-width:70px;}
.tl-stat-num{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--white);line-height:1;}
.tl-stat-label{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}

/* ══ INSIGHTS ══ */
.ins-wrap{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
.ins-header{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;}
.ins-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;}
.ins-period{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted2);letter-spacing:.1em;}

/* KPIs */
.ins-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px;}
@media(max-width:500px){.ins-kpi-row{grid-template-columns:repeat(2,1fr);}}
.ins-kpi{background:var(--surface);border:1px solid var(--border);padding:14px 12px;text-align:center;}
.ins-kpi-val{font-family:'Cinzel',serif;font-size:24px;font-weight:700;line-height:1;margin-bottom:4px;}
.ins-kpi-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;color:var(--text);text-transform:uppercase;margin-bottom:2px;}
.ins-kpi-sub{font-size:10px;color:var(--muted2);font-style:italic;}

/* Categorías */
.ins-section-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;
  color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.ins-cat-bars{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.ins-cat-bar-row{display:flex;align-items:center;gap:10px;}
.ins-cat-label{font-size:12px;color:var(--text);min-width:90px;flex-shrink:0;}
.ins-cat-track{flex:1;height:6px;background:var(--border);position:relative;display:flex;align-items:center;}
.ins-cat-fill{height:100%;transition:width .5s ease;min-width:0;}
.ins-cat-pct{font-family:'JetBrains Mono',monospace;font-size:8px;margin-left:8px;min-width:28px;flex-shrink:0;}

/* Frecuencias */
.ins-freq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(max-width:500px){.ins-freq-grid{grid-template-columns:1fr;}}
.ins-freq-card{background:var(--surface);border:1px solid var(--border);padding:14px 16px;}
.ins-freq-title{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.15em;
  color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.ins-freq-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;}
.ins-freq-badge{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.1em;
  padding:2px 7px;text-transform:uppercase;flex-shrink:0;}
.ins-freq-most{background:rgba(90,170,140,.15);color:#5aaa8c;border:1px solid rgba(90,170,140,.3);}
.ins-freq-least{background:rgba(41,121,255,.12);color:#c0392b;border:1px solid rgba(41,121,255,.25);}
.ins-freq-name{font-size:13px;flex:1;}
.ins-freq-count{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--muted);flex-shrink:0;}
.ins-freq-empty{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted2);font-style:italic;padding:4px 0;}

/* Día de semana */
.ins-weekday-bars{display:flex;gap:3px;align-items:flex-end;height:52px;margin-bottom:6px;}
.ins-weekday-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.ins-weekday-bar-wrap{flex:1;display:flex;align-items:flex-end;width:100%;}
.ins-weekday-bar{width:100%;border-radius:1px 1px 0 0;transition:height .4s;}
.ins-weekday-label{font-family:'JetBrains Mono',monospace;font-size:7px;text-transform:uppercase;}
.ins-weekday-meta{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;margin-top:4px;}

/* ══════════════════════════════
   FINANZAS
══════════════════════════════ */
.fin-page{max-width:720px;margin:0 auto;padding:28px 20px 100px;}
.fin-header{margin-bottom:28px;}
.fin-eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.fin-title{font-family:'Cinzel',serif;font-size:clamp(22px,4vw,30px);font-weight:700;color:var(--white);line-height:1.1;}
.fin-month{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.15em;}

/* Balance cards */
.fin-balance-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
@media(max-width:480px){.fin-balance-grid{grid-template-columns:1fr;}}
.fin-bal-card{background:var(--surface);border:1px solid var(--border);padding:18px 16px;position:relative;overflow:hidden;}
.fin-bal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.fin-bal-card.income::before{background:var(--teal);}
.fin-bal-card.expense::before{background:#4fc3f7;}
.fin-bal-card.balance::before{background:var(--gold);}
.fin-bal-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.fin-bal-amount{font-family:'Cinzel',serif;font-size:clamp(16px,3vw,22px);font-weight:700;line-height:1;}
.fin-bal-card.income .fin-bal-amount{color:var(--aura-blue);}
.fin-bal-card.expense .fin-bal-amount{color:#4fc3f7;}
.fin-bal-card.balance .fin-bal-amount{color:var(--gold);}
.fin-bal-sub{font-size:10px;color:var(--muted2);margin-top:4px;font-style:italic;}

/* Meta de ahorro */
.fin-meta-card{background:var(--surface);border:1px solid var(--border);padding:16px 18px;margin-bottom:20px;}
.fin-meta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.fin-meta-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.fin-meta-pct{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);}
.fin-meta-track{height:5px;background:var(--border);margin-bottom:6px;}
.fin-meta-fill{height:100%;background:linear-gradient(90deg,var(--aura-purple),var(--aura-blue));transition:width .6s ease;}
.fin-meta-amounts{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted2);}

/* Formulario nuevo registro */
.fin-form-card{background:var(--surface);border:1px solid var(--border);padding:18px;margin-bottom:20px;}
.fin-form-title{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.fin-type-toggle{display:flex;gap:6px;margin-bottom:14px;}
.fin-type-btn{flex:1;padding:9px;background:transparent;border:1px solid var(--border2);
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;
  cursor:pointer;transition:all .2s;text-transform:uppercase;color:var(--muted);}
.fin-type-btn.income.active{border-color:var(--teal);color:var(--teal);background:rgba(124,77,255,.1);}
.fin-type-btn.expense.active{border-color:#4fc3f7;color:#4fc3f7;background:rgba(79,195,247,.1);}
.fin-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
@media(max-width:440px){.fin-form-row{grid-template-columns:1fr;}}
.fin-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;
  transition:border-color .2s;}
.fin-input:focus{border-color:var(--gold);}
.fin-input::placeholder{color:var(--muted2);}
.fin-select{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;cursor:pointer;}
.fin-cats-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.fin-cat-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.fin-cat-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.fin-submit-btn{width:100%;padding:13px;background:transparent;
  border:1px solid var(--gold);color:var(--gold);
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;transition:all .25s;text-transform:uppercase;}
.fin-submit-btn:hover{background:var(--gold-dim);}
.fin-submit-btn:disabled{opacity:.35;cursor:not-allowed;}

/* Dona chart */
.fin-charts-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
@media(max-width:500px){.fin-charts-row{grid-template-columns:1fr;}}
.fin-chart-card{background:var(--surface);border:1px solid var(--border);padding:16px;}
.fin-chart-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.fin-donut-wrap{display:flex;align-items:center;gap:14px;}
.fin-donut-svg{flex-shrink:0;}
.fin-donut-legend{flex:1;display:flex;flex-direction:column;gap:5px;}
.fin-donut-item{display:flex;align-items:center;gap:6px;}
.fin-donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fin-donut-cat{font-size:11px;color:var(--text);flex:1;}
.fin-donut-pct{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);}

/* Barras semanales */
.fin-weekly-bars{display:flex;gap:6px;align-items:flex-end;height:70px;margin-top:8px;}
.fin-week-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.fin-week-bar-group{flex:1;width:100%;display:flex;gap:2px;align-items:flex-end;}
.fin-week-bar{flex:1;border-radius:1px 1px 0 0;min-height:2px;transition:height .4s;}
.fin-week-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted2);}

/* Transacciones */
.fin-txs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.fin-txs-title{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.fin-tx-filters{display:flex;gap:5px;flex-wrap:wrap;}
.fin-tx-filter{background:transparent;border:1px solid var(--border);color:var(--muted2);
  font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.1em;
  padding:4px 10px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.fin-tx-filter.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
.fin-tx-list{display:flex;flex-direction:column;gap:1px;}
.fin-tx-item{display:flex;align-items:center;gap:0;background:var(--surface);
  border:1px solid var(--border);padding:0;overflow:hidden;transition:border-color .15s;}
.fin-tx-item:hover{border-color:var(--border2);}
.fin-tx-cat-bar{width:3px;align-self:stretch;flex-shrink:0;}
.fin-tx-body{flex:1;padding:11px 14px;display:flex;align-items:center;gap:12px;}
.fin-tx-icon{font-size:16px;flex-shrink:0;}
.fin-tx-info{flex:1;}
.fin-tx-desc{font-size:13px;color:var(--text);}
.fin-tx-meta{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted2);margin-top:2px;}
.fin-tx-amount{font-family:'Cinzel',serif;font-size:15px;font-weight:700;flex-shrink:0;}
.fin-tx-amount.income{color:var(--teal);}
.fin-tx-amount.expense{color:#4fc3f7;}
.fin-tx-del{background:transparent;border:none;color:var(--muted2);padding:12px 14px;
  cursor:pointer;font-size:12px;transition:color .15s;flex-shrink:0;}

.fin-tx-empty{text-align:center;padding:40px 0;font-family:'JetBrains Mono',monospace;

/* Meta input */

/* Nav meses */

.fin-month-nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
