            : React.createElement('div',{className:'tl-tooltip-empty'},'Sin registro')

    // ── Stats resumen del rango ──

      React.createElement('div',{className:'tl-stat-item'},
        React.createElement('span',{className:'tl-stat-num'},activeDays.length),
        React.createElement('span',{className:'tl-stat-label'},'días activos')
      ),
      React.createElement('div',{className:'tl-stat-item'},
        React.createElement('span',{className:'tl-stat-num'},rangeData.filter(({obj})=>!!obj.gym&&obj.gym!=='descanso').length),
        React.createElement('span',{className:'tl-stat-label'},'días gym')

      (() => {
        let streak=0;
        for(let i=rangeData.length-1;i>=0;i--){

          if(Object.keys(obj).filter(k=>!k.startsWith('_')).length>0) streak++; else break;
        }
        return React.createElement('div',{className:'tl-stat-item'},
          React.createElement('span',{className:'tl-stat-num',style:{color:'#00f0ff'}},streak),

      ),
      React.createElement('button',{className:'dia-refresh-btn',style:{marginLeft:'auto'},
        onClick:()=>setRefreshKey(k=>k+1)},'↻')
    ),

    // ── INSIGHTS ──
    React.createElement(TimelineInsights,{rangeData, activeRange})
  );
}

// ══════════════════════════════════════════════════
// TIMELINE INSIGHTS — Frecuencias, patrones, KPIs
// ══════════════════════════════════════════════════
function TimelineInsights({rangeData, activeRange}){
  const MG = typeof MUSCLE_GROUPS!=='undefined'?MUSCLE_GROUPS:[];

  // ── Calcular todas las frecuencias ──
  const total = rangeData.length;
  const active = rangeData.filter(({obj})=>Object.keys(obj).filter(k=>!k.startsWith('_')).length>0).length;

  // Gym por músculo
  const gymFreq = {};
  MG.forEach(m=>{ gymFreq[m.id]=0; });
  let gymTotal=0, descTotal=0;
  rangeData.forEach(({obj})=>{
    if(obj.gym){ if(obj.gym==='descanso') descTotal++; else { gymTotal++; gymFreq[obj.gym]=(gymFreq[obj.gym]||0)+1; } }
  });
  const gymEntries = Object.entries(gymFreq).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const gymMost  = gymEntries[0];
  const gymLeast = [...gymEntries].sort((a,b)=>a[1]-b[1])[0];

  // Trabajo por negocio
  const workFreq = {COSMO:0,PromoBello:0,'Ritual Verde':0,Otro:0};
  rangeData.forEach(({obj})=>{ (obj.negocios||[]).forEach(n=>{ if(workFreq[n]!==undefined) workFreq[n]++; }); });
  const workEntries = Object.entries(workFreq).sort((a,b)=>b[1]-a[1]);
  const workMost  = workEntries[0];
  const workLeast = [...workEntries].filter(([,v])=>v>0).sort((a,b)=>a[1]-b[1])[0];

  // Estudio por área
  const studyFreq = {Negocios:0,'Inglés':0,'Joyería':0};
  rangeData.forEach(({obj})=>{ (obj.areas||[]).forEach(a=>{ if(studyFreq[a]!==undefined) studyFreq[a]++; }); });
  const studyEntries = Object.entries(studyFreq).sort((a,b)=>b[1]-a[1]);
  const studyMost  = studyEntries[0];
  const studyLeast = [...studyEntries].filter(([,v])=>v>0).sort((a,b)=>a[1]-b[1])[0];

  // Día de la semana más activo
  const dayOfWeek = [0,0,0,0,0,0,0]; // D L M X J V S
  const dayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  rangeData.forEach(({date,obj})=>{
    if(Object.keys(obj).filter(k=>!k.startsWith('_')).length>0){
      dayOfWeek[new Date(date).getDay()]++;
    }
  });
  const maxDayVal = Math.max(...dayOfWeek);
  const bestDayIdx = maxDayVal>0 ? dayOfWeek.indexOf(maxDayVal) : -1;
  // Peor día: solo entre días que tienen al menos algún dato
  const activeDayIdxs = dayOfWeek.map((v,i)=>v>0?i:-1).filter(i=>i>=0);
  const worstDayIdx = activeDayIdxs.length>1
    ? activeDayIdxs.reduce((a,b)=>dayOfWeek[a]<=dayOfWeek[b]?a:b)
    : -1;

  // Racha más larga en el período
  let maxStreak=0, curStreak=0;
  rangeData.forEach(({obj})=>{
    if(Object.keys(obj).filter(k=>!k.startsWith('_')).length>0){ curStreak++; maxStreak=Math.max(maxStreak,curStreak); }
    else curStreak=0;
  });

  // Consistencia % por categoría
  const pct = (n) => total>0?Math.round((n/total)*100):0;
  const gymPct    = pct(gymTotal+descTotal);
  const workPct   = pct(rangeData.filter(({obj})=>(obj.negocios||[]).length>0).length);
  const studyPct  = pct(rangeData.filter(({obj})=>(obj.areas||[]).length>0).length);
  const ciePct    = pct(rangeData.filter(({obj})=>!!(obj.cierre||obj.boceto)).length);

  // Días sin actividad consecutivos al final (brecha actual)
  let gap=0;
  for(let i=rangeData.length-1;i>=0;i--){
    if(Object.keys(rangeData[i].obj).filter(k=>!k.startsWith('_')).length>0) break;
    gap++;
  }

  const GYM_C = {pecho:'#60d4ff',espalda:'#9d6fff',piernas:'#00f0ff',hombros:'#c9a8ff',
    brazos:'#60d4ff',core:'#3eeebb',fullbody:'#5599ff',descanso:'#1c1c35'};
  const WORK_C = {COSMO:'#9d6fff',PromoBello:'#60d4ff','Ritual Verde':'#00f0ff',Otro:'#454570'};
  const STUDY_C = {Negocios:'#60d4ff','Inglés':'#b07fff','Joyería':'#00f0ff'};
  const dayColors = ['#00f0ff','#60d4ff','#9d6fff','#c9a8ff','#5599ff','#3eeebb','#00f0ff'];

  // ── Render ──
  return React.createElement('div',{className:'ins-wrap'},

    // Header
    React.createElement('div',{className:'ins-header'},
      React.createElement('span',{className:'ins-eyebrow'},'◈ Insights'),
      React.createElement('span',{className:'ins-period'},`Últimos ${activeRange} días`)
    ),

    // ── Fila 1: KPIs numéricos ──
    React.createElement('div',{className:'ins-kpi-row'},
      [
        {label:'Consistencia',  val:pct(active)+'%',  sub:'días con actividad',     color:'#00f0ff'},
        {label:'Racha máx.',    val:maxStreak+'d',     sub:'en este período',        color:'#9d6fff'},
        {label:'Brecha actual', val:gap>0?gap+'d':'—', sub:'días sin registro',      color:gap>=3?'#5599ff':gap>0?'#b07fff':'#3eeebb'},
        {label:'Cierres',       val:ciePct+'%',        sub:'de noches cerradas',     color:'#9097c0'},
      ].map(k=>React.createElement('div',{key:k.label,className:'ins-kpi'},
        React.createElement('div',{className:'ins-kpi-val',style:{color:k.color}},k.val),
        React.createElement('div',{className:'ins-kpi-label'},k.label),
        React.createElement('div',{className:'ins-kpi-sub'},k.sub)
      ))
    ),

    // ── Fila 2: Consistencia por categoría ──
    React.createElement('div',{className:'ins-section-label'},'Consistencia por categoría'),
    React.createElement('div',{className:'ins-cat-bars'},
      [
        {label:'💪 Gym',    pct:gymPct,  color:'#60d4ff'},
        {label:'🏢 Trabajo',pct:workPct, color:'#9b7fd4'},
        {label:'📚 Estudio',pct:studyPct,color:'#60d4ff'},
        {label:'🌙 Cierre', pct:ciePct,  color:'#9097c0'},
      ].map(c=>React.createElement('div',{key:c.label,className:'ins-cat-bar-row'},
        React.createElement('span',{className:'ins-cat-label'},c.label),
        React.createElement('div',{className:'ins-cat-track'},
          React.createElement('div',{className:'ins-cat-fill',
            style:{width:c.pct+'%',background:c.color,
              boxShadow:c.pct>0?`0 0 8px ${c.color}50`:''}}),
          React.createElement('span',{className:'ins-cat-pct',style:{color:c.pct>60?c.color:'var(--muted)'}},c.pct+'%')
        )
      ))
    ),

    // ── Fila 3: Más / Menos frecuente ──
    React.createElement('div',{className:'ins-freq-grid'},

      // Gym
      React.createElement('div',{className:'ins-freq-card'},
        React.createElement('div',{className:'ins-freq-title'},'💪 Gym'),
        gymMost&&React.createElement('div',{className:'ins-freq-item'},
          React.createElement('span',{className:'ins-freq-badge ins-freq-most'},'+ frecuente'),
          React.createElement('span',{className:'ins-freq-name',style:{color:GYM_C[gymMost[0]]||'#60d4ff'}},
            (MG.find(m=>m.id===gymMost[0])?.icon||'')+'  '+(MG.find(m=>m.id===gymMost[0])?.label||gymMost[0])),
          React.createElement('span',{className:'ins-freq-count'},gymMost[1]+'d')
        ),
        gymLeast&&gymLeast[0]!==gymMost?.[0]&&React.createElement('div',{className:'ins-freq-item'},
          React.createElement('span',{className:'ins-freq-badge ins-freq-least'},'- frecuente'),
          React.createElement('span',{className:'ins-freq-name',style:{color:GYM_C[gymLeast[0]]||'#60d4ff'}},
            (MG.find(m=>m.id===gymLeast[0])?.icon||'')+'  '+(MG.find(m=>m.id===gymLeast[0])?.label||gymLeast[0])),
          React.createElement('span',{className:'ins-freq-count'},gymLeast[1]+'d')
        ),
        gymEntries.length===0&&React.createElement('div',{className:'ins-freq-empty'},'Sin datos')
      ),

      // Trabajo
      React.createElement('div',{className:'ins-freq-card'},
        React.createElement('div',{className:'ins-freq-title'},'🏢 Trabajo'),
        workMost&&workMost[1]>0&&React.createElement('div',{className:'ins-freq-item'},
          React.createElement('span',{className:'ins-freq-badge ins-freq-most'},'+ frecuente'),
          React.createElement('span',{className:'ins-freq-name',style:{color:WORK_C[workMost[0]]||'#9b7fd4'}},workMost[0]),
          React.createElement('span',{className:'ins-freq-count'},workMost[1]+'d')
        ),
        workLeast&&workLeast[0]!==workMost?.[0]&&React.createElement('div',{className:'ins-freq-item'},
          React.createElement('span',{className:'ins-freq-badge ins-freq-least'},'- frecuente'),
          React.createElement('span',{className:'ins-freq-name',style:{color:WORK_C[workLeast[0]]||'#9b7fd4'}},workLeast[0]),
          React.createElement('span',{className:'ins-freq-count'},workLeast[1]+'d')
        ),
        workEntries.every(([,v])=>v===0)&&React.createElement('div',{className:'ins-freq-empty'},'Sin datos')
      ),

      // Estudio
      React.createElement('div',{className:'ins-freq-card'},
        React.createElement('div',{className:'ins-freq-title'},'📚 Estudio'),
        studyMost&&studyMost[1]>0&&React.createElement('div',{className:'ins-freq-item'},
          React.createElement('span',{className:'ins-freq-badge ins-freq-most'},'+ frecuente'),
          React.createElement('span',{className:'ins-freq-name',style:{color:STUDY_C[studyMost[0]]||'#60d4ff'}},studyMost[0]),
          React.createElement('span',{className:'ins-freq-count'},studyMost[1]+'d')
        ),

function fmtCOP(n){
  if(n===undefined||n===null) return '$0';
  return '$'+Math.round(n).toLocaleString('es-CO');
}
function txId(){ return 'tx'+Date.now()+Math.floor(Math.random()*9999); }
function monthKey(y,m){ return `fin-${y}-${String(m+1).padStart(2,'0')}`; }

async function loadFinMonth(y,m){
  try{
    const r = await window.storage.get(monthKey(y,m));
    return r ? JSON.parse(r.value) : {txs:[], meta:0};
  }catch(e){ return {txs:[], meta:0}; }
}
async function saveFinMonth(y,m,data){
  try{
    await window.storage.set(monthKey(y,m), JSON.stringify(data));
  }catch(e){ console.error('saveFinMonth error:',e); }
}

function DonutChart({data, size=110}){
  // data: [{label, value, color}]
  const total = data.reduce((s,d)=>s+d.value,0);
  if(total===0) return React.createElement('div',{style:{
    width:size,height:size,borderRadius:'50%',background:'var(--border)',
    display:'flex',alignItems:'center',justifyContent:'center',
    fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:'var(--muted2)'
  }},'vacío');

  const cx=size/2, cy=size/2, r=size/2-10, ri=size/2-22;
  let angle = -Math.PI/2;
  const slices = data.filter(d=>d.value>0).map(d=>{
    const sweep = (d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const xi1=cx+ri*Math.cos(angle-sweep), yi1=cy+ri*Math.sin(angle-sweep);
    const xi2=cx+ri*Math.cos(angle), yi2=cy+ri*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return {
      d:`M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1} Z`,
      color:d.color, label:d.label, pct:Math.round((d.value/total)*100)
    };
  });

  return React.createElement('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`,className:'fin-donut-svg'},
    slices.map((s,i)=>React.createElement('path',{key:i,d:s.d,fill:s.color,opacity:.85}))
  );
}

// ══ CIERRE NOCTURNO — Chat con mentor ══
function CierreNocturno({dayLogs, setDayLogs, sharedMissions, today, resolvedColor, day, setDay}){
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [phase, setPhase] = useState('idle'); // idle | chat | done
  const messagesEndRef = React.useRef(null);
  const activeMissions = (sharedMissions||[]).filter(m=>m.status==='active');

  // Scroll al final del chat
  useEffect(()=>{
    if(messagesEndRef.current) messagesEndRef.current.scrollIntoView({behavior:'smooth'});
  },[messages]);

  // Cargar chat guardado desde clave separada
  useEffect(()=>{
    loadDayChat(todayKey()).then(saved=>{
      if(saved && saved.length>0){
        setMessages(saved);
        setPhase((day&&(day.boceto||day.cierre))?'done':'chat');
      } else if(dayLogs['cierre_chat']){
        try{
          const s = JSON.parse(dayLogs['cierre_chat']);
          if(s.length>0){ setMessages(s); setPhase(dayLogs['boceto_manana']?'done':'chat'); }
        }catch(e){}
      }
    });
  },[]);

  const saveMessages = (msgs) => {
    setMessages(msgs);
    // Guardar chat en clave separada (puede ser grande)
    window.storage.set('ceo-day-chat-'+todayKey(), JSON.stringify(msgs)).catch(e=>console.error('chat save error:',e));
    setDayLogs(prev=>({...prev,'cierre_chat':JSON.stringify(msgs)}));
  };

  const startChat = async () => {
    setSending(true);
    setPhase('chat');
    const missionsList = activeMissions.slice(0,5).map(m=>'- '+m.title).join('\n')||'- Sin misiones activas';
    const intro = {
      role:'assistant',
      text:'Bien, cerremos el día. Tengo tus misiones activas:\n\n'+missionsList+'\n\n¿Cuál fue tu movimiento más importante hoy?'
    };
    saveMessages([intro]);
    setSending(false);
  };

  const sendMessage = async () => {
    if(!input.trim()||sending) return;
    const userMsg = {role:'user', text:input.trim()};
    const newMsgs = [...messages, userMsg];
    saveMessages(newMsgs);
    setInput('');
    setSending(true);

    // Build conversation for API
    const history = newMsgs.map(m=>({role:m.role==='assistant'?'assistant':'user', content:m.text}));
    const systemPrompt = `Eres el mentor estratégico personal de Diego, CEO de 3 negocios (COSMO, PromoBello, Ritual Verde). 
Estás guiando el cierre nocturno del día. Tu rol:
1. Hacer máximo 3 preguntas cortas y directas sobre el día
2. Con las respuestas, generar: (a) una reflexión de cierre de 2-3 oraciones, (b) el boceto del mañana con el movimiento más importante
3. Cuando tengas suficiente info (2-3 intercambios), responde con un JSON al final así:
{"cierre":"texto reflexión","boceto":"texto boceto mañana","done":true}

Tono: mentor estoico, directo, sin adulación. Español.`;

    try{
      // Build a single prompt from history + system
      const historyText = history.map(m=>(m.role==='user'?'Diego: ':'Mentor: ')+m.content).join('\n');
      const fullPrompt = systemPrompt + '\n\nConversación hasta ahora:\n' + historyText;
      const raw = await callClaude(fullPrompt, 600);

      // Check if mentor is done — look for JSON
      const jsonMatch = raw.match(/\{[\s\S]*"done"\s*:\s*true[\s\S]*\}/);
      if(jsonMatch){
        try{
          const parsed = JSON.parse(jsonMatch[0]);
          // Extract clean text without the JSON
          const cleanText = raw.replace(jsonMatch[0],'').trim();
          const finalMsg = {role:'assistant', text:cleanText||'Listo. Guardé tu cierre y el boceto de mañana.'};
          const finalMsgs = [...newMsgs, finalMsg];
          saveMessages(finalMsgs);
          setDayLogs(prev=>({...prev,
            'cierre_texto': parsed.cierre||'',
            'boceto_manana': parsed.boceto||''
          }));
          // Guardar solo cierre/boceto (texto corto) en day
          const cierreUpdate = {cierre: (parsed.cierre||'').slice(0,500), boceto: (parsed.boceto||'').slice(0,300)};
          if(setDay) setDay(prev=>{ const n={...prev,...cierreUpdate}; saveDayNow(todayKey(),n); return n; });
          else saveDayNow(todayKey(),{...(day||{}),...cierreUpdate});
          setPhase('done');
        }catch(e){
          const assistantMsg = {role:'assistant', text:raw};
          saveMessages([...newMsgs, assistantMsg]);
        }
      } else {
        const assistantMsg = {role:'assistant', text:raw};
        saveMessages([...newMsgs, assistantMsg]);
      }
    }catch(e){
      // Fallback sin API
      const fallbackFlow = [
        '¿Qué quedó pendiente que debes mover mañana primero?',
        '{"cierre":"Un día más en el registro. La consistencia es la estrategia.","boceto":"Retomar lo pendiente como primer movimiento del día.","done":true}'
      ];
      const step = newMsgs.filter(m=>m.role==='user').length;
      const txt = fallbackFlow[Math.min(step-1, fallbackFlow.length-1)];
      if(txt.includes('"done"')){
        try{
          const p = JSON.parse(txt);
          setDayLogs(prev=>({...prev,'cierre_texto':p.cierre,'boceto_manana':p.boceto}));
          saveMessages([...newMsgs,{role:'assistant',text:'Listo. Guardé tu cierre y el boceto.'}]);
          setPhase('done');
        }catch(e2){}
      } else {
        saveMessages([...newMsgs,{role:'assistant',text:txt}]);
      }
    }
    setSending(false);
  };

  const toggleMission = (id) => {
    setDayLogs(prev=>({...prev,['cierre_check_'+id]:!prev['cierre_check_'+id]}));
  };

  // ── RENDER ──
  return React.createElement('div',{className:'cierre-section'},

    // Misiones check
    activeMissions.length>0&&React.createElement('div',null,
      React.createElement('div',{className:'cierre-section-label'},'Misiones — ¿avanzaste hoy?'),
      React.createElement('div',{className:'cierre-checks'},
        activeMissions.slice(0,6).map(m=>{

          return React.createElement('div',{key:m.id,
            className:'cierre-check-item'+(isChecked?' checked':''),

            React.createElement('div',{className:'cierre-check-box'},isChecked?'✓':''),

    phase==='idle'&&React.createElement('button',{

      onClick:startChat},'✦ Hablar con el Mentor'),

async function loadProfile(){
  try{
    const r=await window.storage.get('ceo-profile');
    if(r){
      const p=JSON.parse(r.value);
      // Asegurar que tiene todos los campos (compatibilidad)
      return {...emptyProfile(),...p,
        totalStats:{...emptyProfile().totalStats,...(p.totalStats||{})},
        phaseCounts:{...emptyProfile().phaseCounts,...(p.phaseCounts||{})},
        phaseStreaks:{...emptyProfile().phaseStreaks,...(p.phaseStreaks||{})},
      };
    }
    // Primera vez — crear perfil real vacío
    const fresh = emptyProfile();
    await window.storage.set('ceo-profile',JSON.stringify(fresh));
    return fresh;
  }catch(e){ return emptyProfile(); }

async function saveDailyState(entry){
  try{

  const [ceoLevel,setCeoLevel]=useState(1);
  const [profile,setProfile]=useState(null);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('ceo-apikey')||'');
  const [apiKeyInput,setApiKeyInput]=useState('');
  const [activeBuffs,setActiveBuffs]=useState(()=>loadBuffs());
  const [dayLogs,setDayLogs]=useState({});
  const [day,setDay]=useState({});  // nuevo sistema — objeto del día
  const [dayLogsReady, setDayLogsReady] = useState(false);

  // Cargar datos del día desde storage
  useEffect(()=>{
    const key = todayKey();
    // Cargar nuevo sistema (day object)
    loadDay(key).then(d=>{
      if(Object.keys(d).length>0){
        setDay(d);
        // Restaurar bloques done
        const done = new Set();
        if(d._done && Array.isArray(d._done)) d._done.forEach(id=>done.add(id));
        if(done.size>0) setDayDone(done);
      }
      setDayLogsReady(true);
    });
    // También cargar sistema viejo para compatibilidad
    loadDayLogs(key).then(logs=>{
      if(Object.keys(logs).length>0) setDayLogs(logs);
    });
  },[]);

  // NO hay auto-guardado — cada componente guarda directamente con saveDay()
  // Esto evita race conditions y saves innecesarios
  const [openBlock,setOpenBlock]=useState(null);
  const [sharedMissions,setSharedMissions]=useState([]);
  const today=todayKey();

  // Load missions once at app level so Reinos and Misiones stay in sync
  useEffect(()=>{
    loadMissions().then(ms=>setSharedMissions(ms||[]));
  },[]);

  const updateSharedMissions = async (newList) => {
    setSharedMissions(newList);
    await saveMissions(newList);
  };

  useEffect(()=>{
    loadProfile().then(p=>{
      const base=p||buildEmptyProfile();
      // Reset streak if last completed day was neither today nor yesterday
      if(base.lastCompletedDay){
        const yest=new Date();yest.setDate(yest.getDate()-1);
        const yKey=`${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
        if(base.lastCompletedDay!==todayKey()&&base.lastCompletedDay!==yKey){
          base.streak=0;
          saveProfile(base);
        }

      setProfile(base);
    });
  },[]);

  // Mount floating button — opens profile in new tab
  

  const allIds=adapted.flatMap(p=>p.anchors.map(a=>a.id));
  const totalMin=adapted.reduce((s,p)=>s+p.adjMin,0);
  const doneCount=allIds.filter(id=>checked.has(id)).length;
  const pct=allIds.length?Math.round(doneCount/allIds.length*100):0;
  const hours=Math.floor(totalMin/60),mins=totalMin%60;

  const applyRewards=(phaseId,currentStats)=>{
    const rewards=PHASE_REWARDS[phaseId]||{};
    const next={...currentStats};
    Object.entries(rewards).forEach(([k,v])=>{next[k]=Math.min((next[k]||0)+v,MAX_STAT);});
    return next;
  };

  const persistPhase=async(phaseId,dayStats,isLastPhase)=>{
    setProfile(prev=>{
      if(!prev) return prev;
      const newTotal={...prev.totalStats};
      const rewards=PHASE_REWARDS[phaseId]||{};
      Object.entries(rewards).forEach(([k,v])=>{newTotal[k]=(newTotal[k]||0)+v;});
      // Apply skill bonuses when ritual is complete
      if(isLastPhase){
        const bonuses=computeSkillBonuses(prev);
        Object.entries(bonuses).forEach(([k,v])=>{if(v>0) newTotal[k]=(newTotal[k]||0)+v;});
      }
      const newLevel=calcLevel(newTotal);
      const weekLog=[...(prev.weekLog||[]).filter(e=>e.date!==today),
        {date:today,stats:dayStats,level:newLevel,complete:isLastPhase}].slice(-90);
      let newStreak=prev.streak;
      let lastDay=prev.lastCompletedDay;
      if(isLastPhase){
        const yest=new Date();yest.setDate(yest.getDate()-1);
        const yKey=`${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
        newStreak=(prev.lastCompletedDay===yKey||prev.lastCompletedDay===today)?prev.streak+1:1;
        lastDay=today;
      }
      // Track phase counts + phase streaks
      const newPhaseCounts={...(prev.phaseCounts||{})};
      newPhaseCounts[phaseId]=(newPhaseCounts[phaseId]||0)+1;
      const newPhaseStreaks={...(prev.phaseStreaks||{})};

      newPhaseStreaks[phaseId]=Math.min((newPhaseStreaks[phaseId]||0)+1, newStreak||1);

            return next;
          });
        },300);
      }
      return n;
    });
  };

// ── Radar Chart SVG ──────────────────────────────────────────────────────────
function RadarChart({stats,animated,aura}){
  const keys=Object.keys(STATS_CONFIG);
  const n=keys.length;
  const cx=100,cy=100,r=70;
  const maxVal=Math.max(...keys.map(k=>stats[k]||0),100);
  const rings=[.25,.5,.75,1];

  const angleOf=i=>(-Math.PI/2)+(2*Math.PI/n)*i;
  const ptOf=(i,val)=>{
    const ratio=Math.min(val/maxVal,1);
    const a=angleOf(i);
    return[cx+r*ratio*Math.cos(a),cy+r*ratio*Math.sin(a)];
  };
  const outerPt=i=>{const a=angleOf(i);return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};

  const dataPoints=keys.map((k,i)=>ptOf(i,animated?(stats[k]||0):0));
  const polyStr=dataPoints.map(([x,y])=>`${x},${y}`).join(' ');

  return React.createElement('svg',{viewBox:'0 0 200 200',style:{width:'100%',maxWidth:240,display:'block',margin:'0 auto'}},
    // Rings
    ...rings.map(ratio=>
      React.createElement('polygon',{
        key:ratio,
        points:keys.map((_,i)=>{const a=angleOf(i);return`${cx+r*ratio*Math.cos(a)},${cy+r*ratio*Math.sin(a)}`;}).join(' '),
        fill:'none',stroke:'var(--border2)',strokeWidth:.8,opacity:.6
      })
    ),
    // Spokes
    ...keys.map((_,i)=>{
      const[x,y]=outerPt(i);
      return React.createElement('line',{key:i,x1:cx,y1:cy,x2:x,y2:y,stroke:'var(--border2)',strokeWidth:.8,opacity:.5});
    }),
    // Data polygon
    React.createElement('polygon',{
      points:polyStr,
      fill:aura+'22',stroke:aura,strokeWidth:1.5,
      style:{transition:'all 1.2s cubic-bezier(.34,1.2,.64,1)'}
    }),
    // Dots
    ...dataPoints.map(([x,y],i)=>
      React.createElement('circle',{
        key:i,cx:x,cy:y,r:3,
        fill:STATS_CONFIG[keys[i]].color,stroke:'var(--black)',strokeWidth:1,
        style:{transition:`all 1.2s cubic-bezier(.34,1.2,.64,1) ${i*80}ms`}
      })
    ),
    // Labels
    ...keys.map((k,i)=>{
      const[x,y]=outerPt(i);
      const lx=cx+(x-cx)*1.22;
      const ly=cy+(y-cy)*1.22;
      return React.createElement('text',{
        key:k,x:lx,y:ly,
        textAnchor:'middle',dominantBaseline:'middle',
        fontSize:6.5,fill:'var(--muted)',
        fontFamily:"'JetBrains Mono',monospace",
        letterSpacing:.5,textTransform:'uppercase'
      },STATS_CONFIG[k].label.toUpperCase())
    })
  );
}

// ── Progress Arc SVG ─────────────────────────────────────────────────────────
function ProgressArc({pct,color,animated}){
  const r=38,cx=50,cy=50;
  const circ=2*Math.PI*r;
  const offset=circ-(animated?(pct/100)*circ:circ);
  return React.createElement('svg',{viewBox:'0 0 100 100',style:{width:140,height:140}},
    React.createElement('circle',{cx,cy,r,fill:'none',stroke:'var(--border2)',strokeWidth:5}),
    React.createElement('circle',{
      cx,cy,r,fill:'none',
      stroke:color,strokeWidth:5,
      strokeLinecap:'round',
      strokeDasharray:circ,
      strokeDashoffset:offset,
      transform:'rotate(-90 50 50)',
      style:{transition:'stroke-dashoffset 1.4s cubic-bezier(.34,1.2,.64,1)'}
    })
  );
}

// ── Heat Map ─────────────────────────────────────────────────────────────────
function HeatMap({weekLog,animated}){
  const today=new Date();
  const days=84; // 12 weeks
  const cells=Array.from({length:days},(_,i)=>{
    const d=new Date(today);
    d.setDate(d.getDate()-(days-1-i));
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const entry=weekLog.find(e=>e.date===key);
    const xp=entry?Object.values(entry.stats||{}).reduce((s,v)=>s+v,0):0;
    const isToday=i===days-1;
    return{key,xp,complete:entry?.complete||false,isToday,day:d.getDay(),date:d};
  });
  const maxXP=Math.max(...cells.map(c=>c.xp),1);
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dayLabels=['D','L','M','X','J','V','S'];
  // Group into weeks (columns)
  const weeks=[];
  for(let i=0;i<days;i+=7) weeks.push(cells.slice(i,i+7));

  return React.createElement('div',{style:{overflowX:'auto'}},
    React.createElement('div',{className:'av-hm-wrap'},
      // Day labels
      React.createElement('div',{className:'av-hm-days'},
        dayLabels.map((l,i)=>React.createElement('div',{key:i,className:'av-hm-day-lbl'},l))
      ),
      // Grid
      React.createElement('div',{className:'av-hm-grid'},
        weeks.map((week,wi)=>
          React.createElement('div',{key:wi,className:'av-hm-col'},
            week.map((cell,di)=>{
              const intensity=cell.xp>0?Math.max(cell.xp/maxXP,.15):0;
              const bg=cell.complete
                ?`rgba(124,77,255,${animated?intensity:.0})`
                :cell.xp>0
                  ?`rgba(0,229,255,${animated?intensity:.0})`
                  :'transparent';
              return React.createElement('div',{
                key:cell.key,
                className:'av-hm-cell'+(cell.isToday?' today':''),
                title:`${cell.key}: ${cell.xp} XP`,
                style:{
                  background:bg,
                  border:cell.isToday?'1px solid var(--gold)':'1px solid var(--border)',
                  transition:`background 1s ease ${(wi*7+di)*8}ms`
                }
              });
            })
          )
        )
      )
    ),
    React.createElement('div',{className:'av-hm-legend'},
      React.createElement('span',{style:{fontSize:8,color:'var(--muted)'}},months[new Date(cells[0].date).getMonth()]),
      React.createElement('div',{style:{flex:1}}),
      React.createElement('div',{className:'av-hm-leg-scale'},
        React.createElement('span',{style:{fontSize:8,color:'var(--muted)',marginRight:6,whiteSpace:'nowrap'}},'Menos'),
        ...[.15,.35,.6,.85,1].map(v=>
          React.createElement('div',{key:v,className:'av-hm-cell',style:{background:`rgba(0,229,255,${v})`,border:'1px solid var(--border)'}})
        ),
        React.createElement('div',{className:'av-hm-cell',style:{background:'rgba(124,77,255,.9)',border:'1px solid rgba(124,77,255,.5)',marginLeft:3}}),
        React.createElement('span',{style:{fontSize:8,color:'var(--muted)',marginLeft:6,whiteSpace:'nowrap'}},'Más  ·  Verde = ritual completo')
      )
    )
  );
}

// Compute total bonus for a given profile (based on unlocked skills)
function computeSkillBonuses(profile){
  const unlocked=computeUnlocked(profile);
  const bonuses={disciplina:0,vitalidad:0,presencia:0,claridad:0,estrategia:0,coherencia:0};
  unlocked.forEach(id=>{
    const b=SKILL_BONUSES[id];
    if(b) bonuses[b.stat]+=b.bonus;
  });
  return bonuses;
}

function getForm(totalXP){ return FORMS.findLast(f=>totalXP>=f.xpMin)||FORMS[0]; }
function getNextForm(totalXP){ return FORMS.find(f=>f.xpMin>totalXP)||null; }
function xpToNextForm(totalXP){ const nxt=getNextForm(totalXP); return nxt?nxt.xpMin-totalXP:0; }
function formProgress(totalXP){
  const cur=getForm(totalXP);
  if(cur.id===5) return 100;
  const range=cur.xpMax-cur.xpMin+1;
  return Math.min(100,Math.round(((totalXP-cur.xpMin)/range)*100));
}

// Flatten for lookup
const ALL_SKILLS = SKILL_BRANCHES.flatMap(b=>b.skills.map(s=>({...s, branchId:b.id, branchColor:b.color})));

function checkCondition(cond, profile, anchorCounts, phaseCounts, phaseStreaks, unlockedIds){
  if(!cond) return false;
  if(cond.type==='streak')          return (profile?.streak||0) >= cond.days;
  if(cond.type==='anchor')          return (anchorCounts?.[cond.id]||0) >= cond.count;
  if(cond.type==='phase')           return (phaseCounts?.[cond.id]||0) >= cond.total;
  if(cond.type==='phase_streak')    return (phaseStreaks?.[cond.id]||0) >= cond.days;
  if(cond.type==='anchors_total')   return Object.values(anchorCounts||{}).reduce((s,v)=>s+v,0) >= cond.count;
  if(cond.type==='skills')          return cond.ids.every(id=>unlockedIds.has(id));
  return false;
}

function conditionLabel(cond){
  if(cond.type==='streak')       return `${cond.days} días seguidos completos`;
  if(cond.type==='anchor')       return `Anclaje completado ${cond.count}×`;
  if(cond.type==='phase')        return `Fase completada ${cond.total}× total`;
  if(cond.type==='phase_streak') return `Fase ${cond.days} días seguidos`;
  if(cond.type==='anchors_total')return `${cond.count} anclajes totales`;
  if(cond.type==='skills')       return `Requiere ${cond.ids.length} habilidades previas`;
  return '';
}

function CharacterPanel({stats,ceoLevel,profile,anchorCounts,phaseCounts,phaseStreaks,onClose}){

  const nextForm=getNextForm(totalXP);
  const prog=formProgress(totalXP);
  const xpLeft=xpToNextForm(totalXP);
  const auraColors=['var(--muted)','var(--gold)','#b07fff','#9b7fd4','#6a3fa0','#ffffff'];
  const auraColor=auraColors[form.id]||'var(--gold)';

  // Compute unlocked skills
  const unlockedIds=new Set();
  ALL_SKILLS.forEach(s=>{
    if(checkCondition(s.cond,profile,anchorCounts,phaseCounts,phaseStreaks,unlockedIds))
      unlockedIds.add(s.id);
  });
  // Second pass for skills that depend on other skills
  ALL_SKILLS.forEach(s=>{
    if(s.cond?.type==='skills' && checkCondition(s.cond,profile,anchorCounts,phaseCounts,phaseStreaks,unlockedIds))

// WEEKLY HISTORY COMPONENT
// ═══════════════════════════════════════════════
const DAY_SHORT=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS_SHORT=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function WeeklyHistory({profile,todayStr}){
  // Build 7-day grid ending today
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const entry=(profile.weekLog||[]).find(e=>e.date===key)||null;
    days.push({key,d,entry,isToday:key===todayStr});
  }

  // Max level for bar scaling
  const maxLevel=Math.max(1,...days.map(d=>d.entry?.level||0));

  // Weekly totals per stat
  const weekTotals=Object.fromEntries(Object.keys(STATS_CONFIG).map(k=>[k,0]));
  days.forEach(({entry})=>{
    if(!entry) return;
    Object.entries(entry.stats||{}).forEach(([k,v])=>{weekTotals[k]=(weekTotals[k]||0)+v;});
  });
  const maxWeekStat=Math.max(1,...Object.values(weekTotals));
  const completedDays=days.filter(d=>d.entry?.complete).length;
  const hasAnyData=days.some(d=>d.entry);

  return React.createElement('div',{className:'week-section'},
    React.createElement('div',{className:'week-title'},
      React.createElement('span',null,'Historial Semanal'),
      completedDays>0&&React.createElement('span',{className:'week-best'},`${completedDays}/7 rituales completos`)
    ),
    !hasAnyData
      ? React.createElement('div',{className:'week-empty'},'Aún no hay datos esta semana. Completa tu primera fase para que aparezca aquí.')
      : React.createElement('div',null,
          // 7-day bar chart
          React.createElement('div',{className:'week-grid'},
            days.map(({key,d,entry,isToday})=>{
              const lvl=entry?.level||0;
              const barH=lvl>0?Math.max(8,Math.round((lvl/maxLevel)*48)):0;
              return React.createElement('div',{key,className:'week-day'},
                React.createElement('div',{className:'wd-bar-wrap'},
                  React.createElement('div',{
                    className:`wd-bar${entry?.complete?' complete':''}${lvl===0?' empty':''}`,
                    style:{height:(lvl===0?2:barH)+'px'}
                  })
                ),
                React.createElement('div',{className:`wd-dot${isToday?' today':entry?.complete?' complete':''}`}),
                React.createElement('div',{className:'wd-label'},DAY_SHORT[d.getDay()])
              );
            })
          ),
          // Stat breakdown
          React.createElement('div',{className:'week-stat-breakdown'},
            React.createElement('div',{className:'wsb-title'},'Atributos · Acumulado esta semana'),
            React.createElement('div',{className:'wsb-grid'},
              Object.entries(STATS_CONFIG).map(([k,cfg])=>
                React.createElement('div',{key:k,className:'wsb-stat'},
                  React.createElement('div',{className:'wsb-lbl'},
                    React.createElement('span',null,cfg.label),
                    React.createElement('span',{className:'wsb-total'},weekTotals[k])
                  ),
                  React.createElement('div',{className:'wsb-track'},
                    React.createElement('div',{className:'wsb-fill',
                      style:{width:Math.round((weekTotals[k]/maxWeekStat)*100)+'%',background:cfg.color}})
                  )
                )
              )
            )
          )
        )
  );
}

// ROOT
// ═══════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState('boot');
  const [dayData,setDayData]=useState(null);
  const [adapted,setAdapted]=useState(null);

  // Al terminar el boot, verificar si ya se hizo el intake hoy
  const handleBootDone = async () => {
    try{
      const r = await window.storage.get('ceo-intake-'+todayKey());
      if(r){
        // Ya se hizo hoy — reconstruir adapted desde datos guardados y saltar directo
        const saved = JSON.parse(r.value);
        const adpt = buildAdaptedFromSaved(saved.phaseAdjustments);
        setAdapted(adpt);
        setScreen('routine');
        return;
      }
    }catch(e){}
    // Primera vez del día — ir al intake
    setScreen('intake');
  };

  return React.createElement('div',{className:'app'},
    screen==='boot'&&React.createElement(Boot,{onDone:handleBootDone}),
    screen==='intake'&&React.createElement(IntakeScreen,{onLaunch:d=>{setDayData(d);setScreen('diagnosis');}}),
    screen==='diagnosis'&&React.createElement(DiagnosisScreen,{data:dayData,onContinue:a=>{setAdapted(a);setScreen('routine');}}),
    screen==='routine'&&adapted&&React.createElement(RoutineScreen,{adapted})
  );
}

// Reconstruye adapted desde ajustes guardados (sin llamar IA)
function buildAdaptedFromSaved(adj){
  return PHASES_BASE.map(phase=>{
    const a=(adj&&adj[phase.id])||{};
    const totalMin=a.minutes||phase.baseTime;
    const baseTotal=phase.anchors.reduce((s,an)=>s+an.baseMin,0);
    return{...phase,adjMin:totalMin,note:a.note||'',
      anchors:phase.anchors.map(an=>({...an,adjMin:Math.max(2,Math.round(an.baseMin*(totalMin/baseTotal)))}))};
  });
}
// Esperar a Firebase antes de renderizar
function startApp(){
  ReactDOM.render(React.createElement(App),document.getElementById('root'));
}
if(window._firebaseReady){
  startApp();
} else {
  document.addEventListener('firebase-ready', startApp, {once:true});
  // Timeout de seguridad: si Firebase no carga en 5s, usar localStorage como fallback
  setTimeout(()=>{
    if(!window._appStarted){
      window._appStarted=true;
      console.warn('Firebase timeout — usando localStorage fallback');
      // Fallback simple con localStorage
      if(!window.storage){
        window.storage = {
          async get(key){ try{ const v=localStorage.getItem(key); return v?{key,value:v}:null; }catch(e){return null;} },
          async set(key,value){ try{ localStorage.setItem(key,value); return {key,value}; }catch(e){return null;} },
          async delete(key){ try{ localStorage.removeItem(key); return {key,deleted:true}; }catch(e){return null;} },
          async list(){ return {keys:[]}; }
        };
      }
      startApp();
    }
  }, 5000);
}

function resolveColor(c){const m={'var(--f1)':'#00f0ff','var(--f2)':'#b07fff','var(--f3)':'#9b7fd4','var(--f4)':'#6a3fa0','var(--f5)':'#9d6fff'};return m[c]||c;}
function checkCond(cond,profile,ac,pc,ps,ids){
  if(!cond)return false;
  if(cond.type==='streak')return(profile?.streak||0)>=cond.days;
  if(cond.type==='anchor')return(ac?.[cond.id]||0)>=cond.count;
  if(cond.type==='phase')return(pc?.[cond.id]||0)>=cond.total;
  if(cond.type==='phase_streak')return(ps?.[cond.id]||0)>=cond.days;
  if(cond.type==='anchors_total')return Object.values(ac||{}).reduce((s,v)=>s+v,0)>=cond.count;
  if(cond.type==='skills')return cond.ids.every(id=>ids.has(id));
  return false;
}
function condLabel(cond){
  if(!cond)return'';
  if(cond.type==='streak')return`${cond.days} días seguidos con ritual completo`;
  if(cond.type==='anchor')return`Anclaje completado ${cond.count}\xd7 en total`;
  if(cond.type==='phase')return`Fase completada ${cond.total}\xd7 en total`;
  if(cond.type==='phase_streak')return`Fase ${cond.days} días seguidos`;
  if(cond.type==='anchors_total')return`${cond.count.toLocaleString()} anclajes totales`;
  if(cond.type==='skills')return`Requiere ${cond.ids.length} habilidades previas`;
  return'';
}
function computeUnlocked(profile){
  const ac=profile?.anchorCounts||{},pc=profile?.phaseCounts||{},ps=profile?.phaseStreaks||{};
  const ids=new Set();
  for(let i=0;i<2;i++) ALL_SKILLS.forEach(s=>{if(checkCond(s.cond,profile,ac,pc,ps,ids))ids.add(s.id);});
  return ids;
}

}

function pel(tag,props,...kids){
  const e=document.createElement(tag);
  (props?Object.entries(props):[]).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e[k.toLowerCase()]=v;
    else if(k==='cls')e.className=v;
    else if(k==='html')e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  kids.flat(Infinity).filter(c=>c!=null&&c!==false).forEach(c=>
    e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}

  const ts=profile?.totalStats||{};
  const xp=Object.values(ts).reduce((s,v)=>s+v,0);
  const form=getForm(xp),next=getNextForm(xp),prog=formProgress(xp),left=xpToNextForm(xp);
  const aura=AURA[form.id]||AURA[1];
  const streak=profile?.streak||0;
  const level=Math.floor(xp/80)+1;
  return pel('aside',{cls:'sidebar'},
    pel('div',null,
      pel('div',{cls:'profile-eyebrow'},'CEO Command Center'),
      pel('div',{cls:'profile-name'},CEO_NAME),
      pel('div',{cls:'profile-form-title',style:{color:aura}},`${form.name} · ${form.title}`)
    ),
    pel('div',null,
      pel('div',{cls:'prog-label'},pel('span',null,next?`\u2192 ${next.name}`:'Forma M\u00e1xima'),next?pel('span',null,`~${Math.ceil(left/130)}d`):pel('span',null,'')),
      pel('div',{cls:'prog-bar'},pel('div',{cls:'prog-fill',style:{width:prog+'%',background:`linear-gradient(90deg,${aura},${aura}88)`}}))
    ),
    pel('div',{cls:'badge-row'},
      pel('span',{cls:'badge',style:{borderColor:aura+'55',color:aura}},`Forma ${form.id}`),
      pel('span',{cls:'badge',style:{borderColor:'rgba(0,229,255,.3)',color:'var(--gold)'}},`Nv ${level}`),
      streak>0?pel('span',{cls:'badge',style:{borderColor:'rgba(41,121,255,.4)',color:'#e07060'}},`\uD83D\uDD25 ${streak}d`):null,
      pel('span',{cls:'badge',style:{borderColor:'var(--border2)',color:'var(--muted)'}},`${xp} XP`),
      pel('span',{cls:'badge',style:{borderColor:'var(--border2)',color:'var(--muted)'}},`${ids.size}/60`)
    ),
    pel('div',{cls:'divider'}),
    pel('div',null,
      pel('div',{cls:'sec-title'},'Atributos CEO'),
      ...Object.entries(STATS_CONFIG).map(([k,cfg])=>{
        const v=ts[k]||0,pct=Math.min(Math.round((v/500)*100),100);
        return pel('div',{cls:'stat-row'},
          pel('div',{cls:'stat-lbl'},cfg.label),
          pel('div',{cls:'stat-track'},pel('div',{cls:'stat-fill',style:{width:pct+'%',background:cfg.color}})),
          pel('div',{cls:'stat-val'},String(v)));
      })
    ),
    pel('div',{cls:'divider'}),
    pel('div',null,
      pel('div',{cls:'sec-title'},'Transformaciones'),
      pel('div',{cls:'form-ladder'},...FORMS.map(f=>{
        const unlocked=xp>=f.xpMin,active=f.id===form.id,fc=AURA[f.id];
        return pel('div',{cls:`form-node${active?' active':unlocked?'':' inactive'}`,style:{borderColor:active?fc+'33':'transparent'}},
          pel('div',{cls:'form-dot',style:{background:unlocked?fc:'var(--border2)'}},unlocked?String(f.id):'?'),
          pel('div',null,
            pel('div',{cls:'form-name',style:{color:unlocked?fc:'var(--muted)',fontFamily:"'Cinzel',serif"}},f.name),
            pel('div',{cls:'form-xp'},f.id===0?'Origen':`${f.xpMin.toLocaleString()} XP`)
          ),
          active?pel('div',{cls:'form-active-dot',style:{color:fc}},'\u25cf'):null
        );
      }))
    )
  );
}

function renderTree(ids){
  const total=ids.size;
  return pel('div',null,
    pel('div',{style:{marginBottom:24}},
      pel('div',{cls:'page-title'},'\u00c1rbol de Habilidades'),
      pel('div',{cls:'page-sub'},`${total}/60 habilidades desbloqueadas`)
    ),
    pel('div',{cls:'global-prog'},
      pel('div',{cls:'global-prog-bar-wrap'},
        pel('div',{cls:'global-prog-label'},pel('span',null,'Progreso global'),pel('span',null,`${Math.round((total/60)*100)}%`)),
        pel('div',{cls:'global-prog-bar'},pel('div',{cls:'global-prog-fill',style:{width:Math.round((total/60)*100)+'%'}}))
      ),
      pel('div',{cls:'global-prog-pct'},`${Math.round((total/60)*100)}%`)
    ),
    pel('div',{cls:'skill-tree-grid'},...SKILL_BRANCHES.map(branch=>{
      const bc=resolveColor(branch.color);
      const bu=branch.skills.filter(s=>ids.has(s.id)).length;
      return pel('div',{cls:'branch-card',style:{borderTopColor:bc}},
        pel('div',{cls:'branch-header'},
          pel('div',{cls:'branch-diamond',style:{background:bc}}),
          pel('div',{cls:'branch-name',style:{color:bc}},branch.label),
          pel('div',{cls:'branch-count'},`${bu}/${branch.skills.length}`)
        ),
        pel('div',{cls:'hex-grid'},...branch.skills.map(skill=>{
          const u=ids.has(skill.id),sel=PS.sel?.id===skill.id;
          const n=pel('div',{cls:`hex${u?' unlocked':''}${sel?' selected':''}`,
            style:{borderColor:u?bc:'var(--border)',background:u?(sel?bc+'28':bc+'12'):'var(--surface)'}},
            pel('div',{cls:'hex-icon',style:{opacity:u?1:.25}},u?'\u2736':'\u00b7'),
            pel('div',{cls:'hex-label',style:{color:u?bc:'var(--muted2)',opacity:u?1:.4}},skill.name.split(' ').slice(0,2).join('\n'))
          );
          n.onclick=()=>profileSetState({sel:sel?null:skill});
          return n;
        })),
        PS.sel&&branch.skills.some(s=>s.id===PS.sel.id)?(()=>{
          const sk=PS.sel,u=ids.has(sk.id);
          return pel('div',{cls:'skill-detail',style:{background:'var(--surface2)',borderLeftColor:bc}},
            pel('div',{cls:'skill-detail-top'},
              pel('div',{cls:'skill-detail-name',style:{color:bc}},sk.name),
              pel('div',{cls:`skill-status ${u?'u':'l'}`},u?'\u2736 Desbloqueada':'Bloqueada')
            ),
            pel('div',{cls:'skill-cond'},condLabel(sk.cond)),
            pel('div',{cls:'skill-sci'},sk.science)
          );
        })():null
      );
    }))
  );
}

function renderUnlocked(ids){
  const list=ALL_SKILLS.filter(s=>ids.has(s.id));
  if(!list.length) return pel('div',{cls:'empty'},'A\u00fan no has desbloqueado ninguna habilidad. Completa tus primeros anclajes para comenzar.');
  return pel('div',null,
    pel('div',{style:{marginBottom:24}},
      pel('div',{cls:'page-title'},'Habilidades Desbloqueadas'),
      pel('div',{cls:'page-sub'},`${list.length} habilidades conquistadas`)
    ),
    pel('div',{cls:'unlocked-grid'},...list.map(sk=>{
      const bc=resolveColor(sk.branchColor);
      const c=pel('div',{cls:'u-card',style:{borderLeftColor:bc}},
        pel('div',{cls:'u-card-branch',style:{color:bc}},sk.branchLabel),
        pel('div',{cls:'u-card-name'},sk.name),
        pel('div',{cls:'u-card-cond'},condLabel(sk.cond))
      );
      c.onclick=()=>{profileSetState({tab:'tree',sel:sk});document.querySelector('.main')?.scrollTo({top:0,behavior:'smooth'});};
      return c;
    }))
  );
}

function profileRender(){
  const ids=computeUnlocked(PS.profile);
  const root=document.getElementById('profile-root'); if(!root)return;
  root.innerHTML='';
  root.appendChild(pel('div',{cls:'layout'},
    renderSidebar(PS.profile,ids),
    pel('main',{cls:'main'},
      pel('div',{cls:'tabs'},
        ...['tree','unlocked'].map(t=>{
          const b=pel('button',{cls:`tab${PS.tab===t?' active':''}`},t==='tree'?'\u00c1rbol de Habilidades':`Desbloqueadas (${ids.size})`);
          b.onclick=()=>profileSetState({tab:t,sel:null});
          return b;
        })
      ),
      PS.tab==='tree'?renderTree(ids):renderUnlocked(ids)
    )
  ));
}

window.addEventListener('storage',e=>{
  if(e.key==='ceo-command-profile'||e.key==='ceo-profile-standalone'){
    try{PS.profile=JSON.parse(e.newValue);}catch(ex){}render();
  }
});



window._openProfilePanel=function(){
  var panel=document.getElementById('profile-panel');
  if(!panel) return;
  if(window._latestProfile) PS.profile=window._latestProfile;
  else{try{var s=localStorage.getItem('ceo-command-profile');if(s)PS.profile=JSON.parse(s);}catch(e){}}
  panel.classList.add('visible');
  document.body.style.overflow='hidden';
  profileRender();
};

function closeProfilePanel(){
  var panel=document.getElementById('profile-panel');
  if(panel){panel.classList.remove('visible');document.body.style.overflow='';}
}

</script>
</body>
</html>
